<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Helegoči</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --bg: #1a0a2e;
    --device: #d8c4f0;
    --device-mid: #b89fd8;
    --device-dark: #9b7cc4;
    --device-shadow: #6b4a9b;
    --pixel: #2d0a4e;
    --btn: #c084e8;
    --btn-dark: #9b5cc4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
  }

  body {
    background: radial-gradient(ellipse at center, #2a0a4e 0%, #0d0018 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', monospace;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 20px 0;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(200,160,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(180,140,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(220,180,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(200,160,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 40%, rgba(180,140,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 90%, rgba(200,160,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 15%, rgba(220,180,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 25%, rgba(180,140,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 75%, rgba(200,160,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 42% 55%, rgba(220,180,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 35%, rgba(180,140,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 5%  50%, rgba(200,160,255,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .device-wrapper {
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 20px 60px rgba(120,0,255,0.4));
  }

  .device {
    width: 320px;
    background: linear-gradient(160deg, #ddd0f5 0%, #c8b0e8 50%, #b89fd8 100%);
    border-radius: 50px 50px 80px 80px;
    padding: 25px 25px 40px;
    position: relative;
    border: 4px solid var(--device-shadow);
    box-shadow:
      inset 0 3px 6px rgba(255,255,255,0.6),
      inset 0 -3px 6px rgba(80,0,120,0.2),
      4px 8px 0 var(--device-shadow);
  }

  .device::after {
    content: '';
    position: absolute;
    bottom: -15px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 20px;
    background: var(--device-shadow);
    border-radius: 0 0 30px 30px;
  }

  .keychain {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 20px;
    border: 4px solid var(--device-shadow);
    border-radius: 50%;
    background: var(--device-dark);
  }

  .device-title {
    text-align: center;
    font-size: 7px;
    color: var(--device-shadow);
    letter-spacing: 3px;
    margin-bottom: 12px;
  }

  .screen-housing {
    background: var(--device-shadow);
    border-radius: 20px;
    padding: 12px;
    margin-bottom: 16px;
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.5), 0 2px 0 rgba(255,255,255,0.3);
  }

  .screen {
    background: #9bbc0f;
    border-radius: 10px;
    width: 100%;
    height: 180px;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 20px rgba(15,56,15,0.3);
  }

  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 10;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  .notif {
    width: 8px; height: 8px;
    background: #ff4466;
    border-radius: 50%;
    position: absolute;
    top: 8px; right: 8px;
    animation: blink 1s infinite;
    display: none;
    z-index: 20;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .msg-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    font-size: 5px;
    color: #2d0a4e;
    text-align: center;
    padding: 4px;
    background: rgba(155,188,15,0.93);
    z-index: 15;
    display: none;
    line-height: 1.8;
  }

  .game-overlay {
    position: absolute;
    inset: 0;
    background: #9bbc0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
    border-radius: 10px;
  }

  .game-overlay.active { opacity: 1; pointer-events: all; }

  .overlay-inner {
    font-size: 6px;
    color: #0f380f;
    text-align: center;
    line-height: 2.5;
    white-space: pre-line;
  }

  .age-display {
    text-align: center;
    font-size: 5px;
    color: var(--device-shadow);
    margin-bottom: 10px;
  }

  .stats {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
    padding: 0 4px;
  }

  .stat-row { display: flex; align-items: center; gap: 8px; }

  .stat-label {
    font-size: 5px;
    color: var(--device-shadow);
    width: 46px;
    flex-shrink: 0;
  }

  .stat-blocks { display: flex; gap: 2px; flex: 1; }

  .stat-block {
    flex: 1;
    height: 10px;
    border: 1px solid var(--device-mid);
    background: rgba(107,74,155,0.15);
  }

  .stat-block.full { background: #4a1a7a; }
  .stat-block.warn { background: #c0392b; }

  .device-decor {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 6px;
  }

  .decor-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--device-shadow);
    opacity: 0.6;
    box-shadow: 0 0 4px rgba(180,100,255,0.4);
  }

  .hint {
    text-align: center;
    font-size: 4px;
    color: var(--device-shadow);
    margin-bottom: 10px;
    opacity: 0.7;
  }

  .buttons {
    display: flex;
    justify-content: space-around;
    padding: 0 8px;
  }

  .btn {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #d8a8ff, #a060d8);
    border: none;
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
    position: relative;
    box-shadow: 0 4px 0 var(--btn-dark), 0 6px 0 var(--device-shadow);
    transition: transform 0.05s, box-shadow 0.05s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active, .btn.pressed {
    transform: translateY(4px);
    box-shadow: 0 1px 0 var(--btn-dark), 0 1px 0 var(--device-shadow);
  }

  /* Prevent all double-tap zoom on interactive elements */
  .btn, canvas, .screen { touch-action: manipulation; }

  .btn-icon { font-size: 16px; line-height: 1; }
  .btn-label { font-size: 4px; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.4); }

  /* Egg color picker */
  .egg-picker {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
  }

  .egg-picker-label {
    font-size: 4px;
    color: var(--device-shadow);
    opacity: 0.8;
  }

  .egg-swatch {
    width: 14px; height: 14px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    border: 2px solid var(--device-shadow);
    cursor: pointer;
    transition: transform 0.1s;
    flex-shrink: 0;
  }

  .egg-swatch:hover  { transform: scale(1.2); }
  .egg-swatch.active { border-color: #fff; box-shadow: 0 0 0 1px var(--device-shadow); }

  .new-game-btn {
    margin-top: 8px;
    padding: 6px 10px;
    background: #4a1a7a;
    border: 2px solid #2d0a4e;
    color: #d8a8ff;
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    cursor: pointer;
    letter-spacing: 1px;
  }

  .new-game-btn:hover { background: #2d0a4e; }

  #offlineNotice {
    font-size: 5px;
    color: #c4a8ff;
    text-align: center;
    margin-top: 10px;
    z-index: 1;
    position: relative;
    min-height: 12px;
    opacity: 0;
    transition: opacity 0.5s;
  }

  #offlineNotice.show { opacity: 1; }
</style>
</head>
<body>

<div class="device-wrapper">
  <div class="device">
    <div class="keychain"></div>
    <div class="device-title">✦ HELEGOČI ✦</div>

    <div class="screen-housing">
      <div class="screen">
        <canvas id="gameCanvas" width="160" height="90"></canvas>
        <div class="notif" id="notif"></div>
        <div class="game-overlay" id="gameOverlay">
          <div class="overlay-inner" id="overlayText"></div>
          <button class="new-game-btn" onclick="newGame()">NOVÁ HRA</button>
        </div>
        <div class="msg-overlay" id="msgOverlay"></div>
      </div>
    </div>

    <div class="age-display" id="ageDisplay">VĚK: 0 LET  ✦  SKÓRE: 0</div>

    <div class="stats">
      <div class="stat-row">
        <div class="stat-label">HLAD</div>
        <div class="stat-blocks" id="hungerBlocks"></div>
      </div>
      <div class="stat-row">
        <div class="stat-label">ŠTĚSTÍ</div>
        <div class="stat-blocks" id="happyBlocks"></div>
      </div>
      <div class="stat-row">
        <div class="stat-label">ENERGIE</div>
        <div class="stat-blocks" id="energyBlocks"></div>
      </div>
    </div>

    <div class="device-decor">
      <div class="decor-dot"></div>
      <div class="decor-dot"></div>
      <div class="decor-dot"></div>
    </div>

    <div class="hint">[1] JÍDLO &nbsp;[2] HRA/ÚKLID &nbsp;[3] SPÁT &nbsp;[4] LÉK</div>

    <div class="buttons">
      <button class="btn" id="btnFood" onclick="doAction('food')">
        <span class="btn-icon">🍙</span>
        <span class="btn-label">JÍDLO</span>
      </button>
      <button class="btn" id="btnPlay" onclick="doAction('play')">
        <span class="btn-icon" id="btnPlayIcon">🎮</span>
        <span class="btn-label" id="btnPlayLabel">HRA</span>
      </button>
      <button class="btn" id="btnSleep" onclick="doAction('sleep')">
        <span class="btn-icon">💤</span>
        <span class="btn-label">SPÁT</span>
      </button>
      <button class="btn" id="btnHeal" onclick="doAction('heal')">
        <span class="btn-icon">💊</span>
        <span class="btn-label">LÉK</span>
      </button>
    </div>
  </div>
</div>

<div id="offlineNotice"></div>

<div class="egg-picker" id="eggPicker">
  <span class="egg-picker-label">BARVA:</span>
</div>

<script>
// ─── STORAGE KEY ────────────────────────────────────────────────────────────
const SAVE_KEY = 'tamagochi_state';

// ─── DEFAULT STATE ──────────────────────────────────────────────────────────
function defaultState() {
  return {
    hunger:     8,
    happiness:  8,
    energy:     8,
    health:     10,
    age:        0,
    score:      0,
    alive:      true,
    sleeping:   false,
    sick:       false,
    hatched:    false,
    eggTimer:   5,
    gameTime:   0,           // total seconds played
    poop:       false,
    poopAge:    0,
    eggColor:   0,
    last_saved_timestamp: new Date().toISOString(),
  };
}

// ─── SAVE / LOAD ─────────────────────────────────────────────────────────────
function saveState() {
  state.last_saved_timestamp = new Date().toISOString();
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
}

function loadState() {
  const saved = localStorage.getItem(SAVE_KEY);
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      // Migrate: make sure all keys exist
      state = Object.assign(defaultState(), parsed);
      return true;
    } catch (e) {
      return false;
    }
  }
  return false;
}

// ─── OFFLINE DECAY ──────────────────────────────────────────────────────────
// Returns string describing what happened, or null if nothing notable
function applyOfflineDecay() {
  if (!state.last_saved_timestamp || !state.alive || !state.hatched) return null;

  const now = Date.now();
  const last = new Date(state.last_saved_timestamp).getTime();
  const rawElapsed = (now - last) / 1000; // seconds

  if (rawElapsed < 10) return null; // ignore tiny gaps

  // Cap at 8 hours of decay max (28800 seconds)
  const elapsed = Math.min(rawElapsed, 28800);
  const hours   = elapsed / 3600;
  const minutes = elapsed / 60;

  // Decay rates (per minute of absence)
  // Hunger drops ~1 point per 20 min, happiness ~1 per 30 min, energy recovers if sleeping
  const hungerDecay    = minutes / 20;
  const happinessDecay = minutes / 30;

  let energyDelta = 0;
  if (state.sleeping) {
    energyDelta = minutes / 12; // recover while sleeping
  } else {
    energyDelta = -(minutes / 40); // slow drain
  }

  // Apply
  // Hunger increases while away (gets more hungry)
  state.hunger    = Math.min(10, state.hunger    + hungerDecay);
  state.happiness = Math.max(0, state.happiness - happinessDecay);
  state.energy    = Math.max(0, Math.min(10, state.energy + energyDelta));

  // Sickness from starvation
  if (state.hunger >= 8 && Math.random() < 0.4) {
    state.sick = true;
  }

  // Health drain from sickness / starvation
  if (state.sick || state.hunger <= 0) {
    state.health = Math.max(0, state.health - hours * 1.5);
  }

  // Check death
  if (state.health <= 0) {
    state.alive = false;
  }

  // Poop if away long enough and alive
  if (hours > 0.5 && state.alive && !state.poop && Math.random() < 0.5) {
    state.poop = true;
  }

  // Age progression: 1 month per ~60 real seconds of gametime, cap offline age gain
  const offlineAgeGain = Math.floor(Math.min(elapsed, 3600) / 60);
  state.age += offlineAgeGain;
  state.gameTime = (state.gameTime || 0) + Math.floor(elapsed);

  // Format message
  if (rawElapsed > 60) {
    const hh = Math.floor(rawElapsed / 3600);
    const mm = Math.floor((rawElapsed % 3600) / 60);
    let timeStr = hh > 0 ? `${hh}h ${mm}m` : `${mm}m`;
    return `Byla jsi pryč ${timeStr}!`;
  }
  return null;
}

// ─── GAME STATE ──────────────────────────────────────────────────────────────
let state = defaultState();

// ─── INIT ────────────────────────────────────────────────────────────────────
let offlineMessage = null;
const hadSave = loadState();
if (hadSave) {
  offlineMessage = applyOfflineDecay();
  saveState();
}

// ─── CANVAS / RENDERER ───────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ─── SPEECH ──────────────────────────────────────────────────────────────────
const synth = window.speechSynthesis;
let speechReady = false;
let voiceCZ = null;

function loadVoice() {
  const voices = synth.getVoices();
  // Prefer Czech, fall back to Slovak, then any
  voiceCZ = voices.find(v => v.lang === 'cs-CZ')
         || voices.find(v => v.lang.startsWith('cs'))
         || voices.find(v => v.lang.startsWith('sk'))
         || voices[0] || null;
  speechReady = true;
}
loadVoice();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoice;

function speak(text, rate = 1.1, pitch = 1.3) {
  if (!synth || !speechReady) return;
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  if (voiceCZ) utt.voice = voiceCZ;
  utt.lang   = voiceCZ ? voiceCZ.lang : 'cs-CZ';
  // Add slight random variation so it never sounds exactly the same twice
  utt.rate   = rate   + (Math.random() * 0.15 - 0.07);
  utt.pitch  = pitch  + (Math.random() * 0.3  - 0.15);
  utt.volume = 0.9;
  synth.speak(utt);
}

const C = {
  bg:      '#9bbc0f',
  mid:     '#8bac0f',
  dark:    '#306230',
  darkest: '#0f380f',
  light:   '#c4d957',
  white:   '#e8f8e8',
  night:   '#0a140a',
};

let animFrame  = 0;
let particles  = [];
let curAction  = null;
let actTimer   = 0;
let msgTimer   = null;
let wanderT    = 0;

// Pre-generate stars
const stars = Array.from({length: 20}, () => ({
  x: Math.floor(Math.random() * 74) + 2,
  y: Math.floor(Math.random() * 52) + 2,
  phase: Math.random() * Math.PI * 2,
}));

// ─── PIXEL HELPERS ───────────────────────────────────────────────────────────
function px(x, y, c) {
  ctx.fillStyle = c;
  ctx.fillRect(x*2, y*2, 2, 2);
}
function r(x, y, w, h, c) {
  ctx.fillStyle = c;
  ctx.fillRect(x*2, y*2, w*2, h*2);
}

// ─── EGG COLOR PALETTES ──────────────────────────────────────────────────────
const EGG_COLORS = [
  { name: 'Bílé',    body: '#e8f8e8', shine: '#ffffff', mid: '#c4d957', outline: '#306230' },
  { name: 'Růžové',  body: '#f9d4e8', shine: '#ffffff', mid: '#f0a8cc', outline: '#a0306a' },
  { name: 'Modré',   body: '#c8e0f8', shine: '#ffffff', mid: '#88bce8', outline: '#2060a0' },
  { name: 'Zlaté',   body: '#faeab0', shine: '#ffffff', mid: '#f0c830', outline: '#a07800' },
  { name: 'Mátové',  body: '#c0f0d8', shine: '#ffffff', mid: '#70d8a8', outline: '#206840' },
];

function eggPal() { return EGG_COLORS[state.eggColor || 0]; }

// ─── COOLDOWN ────────────────────────────────────────────────────────────────
const cooldowns = {}; // key → timestamp ms of last allowed action
const COOLDOWN_MS = { food: 1500, play: 1500, sleep: 1000, heal: 1000 };
const MAX_CLICKS   = { food: 4,    play: 4,    sleep: 99,   heal: 99   };
const clickBurst   = {}; // key → { count, resetAt }

function checkCooldown(type) {
  const now = Date.now();
  // Per-action burst limit (4-5 rapid clicks → silent ignore for 8s)
  if (!clickBurst[type]) clickBurst[type] = { count: 0, resetAt: 0 };
  const burst = clickBurst[type];
  if (now > burst.resetAt) { burst.count = 0; burst.resetAt = now + 8000; }
  burst.count++;
  if (burst.count > MAX_CLICKS[type]) return false; // silently drop
  // Basic cooldown between clicks
  if (cooldowns[type] && now - cooldowns[type] < COOLDOWN_MS[type]) return false;
  cooldowns[type] = now;
  return true;
}


function drawBg() {
  if (state.sleeping) {
    r(0, 0, 80, 90, C.night);
    // Stars
    for (const s of stars) {
      const twinkle = Math.sin(animFrame * 0.06 + s.phase) > 0.3;
      px(s.x, s.y, twinkle ? C.white : C.mid);
    }
    // Moon crescent
    r(60, 6, 8, 8, C.light);
    r(62, 5, 6, 10, C.light);
    r(63, 5, 7, 10, C.night);
    r(62, 6, 2, 8, C.night);
    // Dark floor
    r(0, 64, 80, 3, C.dark);
    r(0, 67, 80, 23, C.darkest);
  } else {
    // Sky
    r(0, 0, 80, 64, C.bg);
    // Scrolling clouds
    const cf = Math.floor(animFrame * 0.015);
    drawCloud((cf % 85), 5);
    drawCloud(((cf + 42) % 85), 9);
    // Sun
    r(64, 3, 8, 8, C.light);
    r(65, 2, 6, 10, C.light);
    r(62, 5, 12, 4, C.light);
    r(66, 4, 4, 6, C.white);
    r(67, 3, 2, 2, C.white);
    // Floor
    r(0, 64, 80, 3, C.mid);
    r(0, 67, 80, 2, C.dark);
    r(0, 69, 80, 21, C.darkest);
    // Flowers
    for (const fx of [10, 37, 64]) {
      px(fx, 64, C.darkest);       // stem
      px(fx-1, 63, '#f7c59f');     // petals
      px(fx+1, 63, '#f7c59f');
      px(fx, 62, C.white);         // center
      px(fx, 63, '#f7c59f');
    }
  }
}

function drawCloud(x, y) {
  r(x+2, y+1, 4, 2, C.white);
  r(x+1, y,   6, 3, C.white);
  r(x+3, y-1, 2, 1, C.white);
}

// ─── EGG ─────────────────────────────────────────────────────────────────────
function drawEgg(x, y) {
  const bob = Math.floor(Math.sin(animFrame * 0.1) * 1);
  const yy  = y + bob;
  const cracking = state.eggTimer < 2;
  const pal = eggPal();

  // Shadow
  r(x+1, yy+9, 8, 1, pal.mid);

  // Egg body
  r(x+3, yy,   4, 1, pal.body);
  r(x+1, yy+1, 8, 1, pal.body);
  r(x+0, yy+2, 10,5, pal.body);
  r(x+1, yy+7, 8, 1, pal.mid);
  r(x+3, yy+8, 4, 1, pal.mid);

  // Shine
  px(x+2, yy+2, pal.shine);
  px(x+2, yy+1, pal.shine);
  px(x+3, yy+1, pal.shine);

  // Outline
  px(x+2,  yy,   pal.outline); px(x+7,  yy,   pal.outline);
  px(x+0,  yy+2, pal.outline); px(x+9,  yy+2, pal.outline);
  px(x+0,  yy+6, pal.outline); px(x+9,  yy+6, pal.outline);
  px(x+1,  yy+8, pal.outline); px(x+8,  yy+8, pal.outline);

  // Cracks
  if (cracking) {
    px(x+4, yy+3, pal.outline);
    px(x+5, yy+4, pal.outline);
    px(x+4, yy+5, pal.outline);
    px(x+6, yy+3, pal.outline);
  }

  // Countdown — pick readable text color based on egg brightness
  ctx.fillStyle = pal.outline;
  ctx.font = '8px monospace';
  const cd = Math.ceil(state.eggTimer);
  if (cd > 0) ctx.fillText(cd, 70*2-4, 60*2);
}

// ─── HELEGOČI CHARACTER ───────────────────────────────────────────────────────
function drawHelego(x, y, mood) {
  const bob = Math.floor(Math.sin(animFrame * 0.12) * 1);
  const yy  = y + (mood === 'sleeping' ? 0 : bob);

  // Body color: from egg palette, green-ish if sick
  const pal    = eggPal();
  const body   = state.sick ? '#b8c840' : pal.body;
  const outline = pal.outline;

  if (mood === 'sleeping') {
    drawSleeping(x, yy);
    return;
  }

  // --- Body blob ---
  // Top cap
  r(x+3, yy+1, 8, 1, outline);
  r(x+2, yy+2, 10,1, outline);
  r(x+1, yy+3, 12,1, outline);
  r(x+0, yy+4, 14,1, outline);
  // Middle rows
  r(x+0, yy+5, 14,6, outline);
  // Bottom
  r(x+0, yy+11,14,1, outline);
  r(x+1, yy+12,12,1, outline);
  r(x+2, yy+13,10,1, outline);

  // Fill
  r(x+4, yy+1, 6, 1, body);
  r(x+3, yy+2, 8, 1, body);
  r(x+2, yy+3, 10,1, body);
  r(x+1, yy+4, 12,1, body);
  r(x+1, yy+5, 12,6, body);
  r(x+2, yy+11,10,1, body);
  r(x+3, yy+12, 8,1, body);

  // Shine
  px(x+3, yy+2, C.white);
  px(x+4, yy+2, C.white);
  px(x+3, yy+3, C.white);

  // --- Eyes ---
  if (mood === 'happy') {
    // ^_^ arcs
    px(x+4,  yy+5, outline);
    px(x+5,  yy+4, outline);
    px(x+6,  yy+4, outline);
    px(x+8,  yy+5, outline);
    px(x+9,  yy+4, outline);
    px(x+10, yy+4, outline);
    // Shine
    px(x+4, yy+4, C.white);
    px(x+8, yy+4, C.white);
  } else if (mood === 'sad') {
    // sad droopy T_T
    r(x+4,  yy+4, 2, 2, outline);
    r(x+9,  yy+4, 2, 2, outline);
    px(x+4,  yy+6, '#6b8cba');  // tear L
    px(x+10, yy+6, '#6b8cba');  // tear R
  } else if (mood === 'sick') {
    // X_X
    px(x+4,  yy+4, outline); px(x+5,  yy+5, outline);
    px(x+5,  yy+4, outline); px(x+4,  yy+5, outline);
    px(x+9,  yy+4, outline); px(x+10, yy+5, outline);
    px(x+10, yy+4, outline); px(x+9,  yy+5, outline);
  } else if (mood === 'eating') {
    // O_O wide
    r(x+4, yy+4, 2, 2, outline);
    r(x+9, yy+4, 2, 2, outline);
    px(x+4, yy+4, C.white);
    px(x+9, yy+4, C.white);
  } else {
    // neutral - - eyes
    r(x+4, yy+5, 2, 1, outline);
    r(x+9, yy+5, 2, 1, outline);
  }

  // --- Mouth ---
  if (mood === 'happy') {
    px(x+5,  yy+7, outline);
    r(x+6,   yy+8, 3, 1, outline);
    px(x+9,  yy+7, outline);
  } else if (mood === 'sad') {
    px(x+5,  yy+8, outline);
    r(x+6,   yy+7, 3, 1, outline);
    px(x+9,  yy+8, outline);
  } else if (mood === 'eating') {
    r(x+5, yy+7, 5, 2, outline);
    r(x+6, yy+7, 3, 2, body);
  } else if (mood === 'sick') {
    px(x+5, yy+8, outline);
    r(x+6, yy+7, 2, 1, outline);
    px(x+8, yy+8, outline);
  } else {
    r(x+5, yy+7, 5, 1, outline);
  }

  // --- Arms ---
  if (mood === 'happy' || mood === 'playing') {
    // Arms up!
    px(x+0, yy+3, outline);
    px(x+13,yy+3, outline);
    px(x-1, yy+4, outline);
    px(x+14,yy+4, outline);
  } else {
    // Arms down
    px(x+0, yy+7, outline);
    px(x+13,yy+7, outline);
  }

  // --- Feet (animated walk) ---
  const step = Math.abs(Math.floor(Math.sin(animFrame * 0.15) * 2));
  r(x+3, yy+13+step,   3, 2, outline);
  r(x+3, yy+13+step,   2, 1, body);
  r(x+8, yy+13+(2-step),3,2, outline);
  r(x+8, yy+13+(2-step),2,1, body);

  // --- Blush (happy) ---
  if (mood === 'happy') {
    px(x+2,  yy+6, '#f7a8a8');
    px(x+11, yy+6, '#f7a8a8');
  }

  // --- Sick spots ---
  if (state.sick) {
    px(x+6,  yy+9,  '#7ec850');
    px(x+9,  yy+8,  '#7ec850');
    px(x+4,  yy+10, '#7ec850');
  }
}

function drawSleeping(x, y) {
  const pal    = eggPal();
  const outline = pal.outline;
  const body    = pal.mid;

  // Rounded sleeping blob (lower, wider)
  r(x+2, y+4,  10, 1, outline);
  r(x+1, y+5,  12, 6, outline);
  r(x+2, y+11, 10, 1, outline);
  r(x+3, y+4,   8, 1, body);
  r(x+2, y+5,  10, 6, body);
  r(x+3, y+11,  8, 1, body);

  // Closed eyes ─── ───
  r(x+3, y+7, 3, 1, outline);
  r(x+8, y+7, 3, 1, outline);

  // Z z z floating
  const zOff = Math.floor(animFrame * 0.04) % 8;
  ctx.fillStyle = C.dark;
  ctx.font = '7px monospace';
  ctx.fillText('z', (x+15)*2, (y+8 - zOff)*2);
  ctx.font = '9px monospace';
  ctx.fillText('Z', (x+18)*2, (y+4 - zOff)*2);
}

// ─── FOOD SPRITE ─────────────────────────────────────────────────────────────
function drawFood(x, y) {
  r(x+1, y+1, 6, 4, C.white);
  r(x+0, y+2, 8, 3, C.white);
  r(x+2, y+0, 4, 1, C.white);
  r(x+0, y+4, 8, 2, C.darkest); // nori
  px(x+0, y+1, C.darkest); px(x+7, y+1, C.darkest);

}

// ─── BALL SPRITE ─────────────────────────────────────────────────────────────
function drawBall(x, y) {
  const spin = Math.floor(animFrame * 0.15) % 3;
  r(x+2, y+0, 4, 1, C.dark);
  r(x+1, y+1, 6, 1, C.dark);
  r(x+0, y+2, 8, 2, C.dark);

// ─── POOP SPRITE ─────────────────────────────────────────────────────────────
function drawPoop(x, y) {
  r(x+2, y+0, 3, 1, C.darkest);
  r(x+1, y+1, 5, 2, C.darkest);
  r(x+0, y+3, 7, 2, C.darkest);
  r(x+2, y+1, 3, 1, '#5a3a1a');
  r(x+1, y+3, 5, 1, '#5a3a1a');

  px(x+1, y-1, C.dark);
  px(x+5, y-2, C.dark);
  px(x+3, y-3, C.mid);

// ─── PARTICLES ───────────────────────────────────────────────────────────────
function spawnParticles(x, y, type) {
  const cols = {
    food:  [C.white, C.light, '#f7c59f'],
    play:  [C.white, C.dark,  C.light],
    heal:  [C.light, '#a8e870', C.white],
    happy: [C.white, '#f7c59f', C.light],
  }[type] || [C.white, C.light];

  for (let i = 0; i < 6; i++) {
    particles.push({
      x: x + Math.random()*4,
      y: y + Math.random()*4,
      vx: (Math.random()-0.5)*2,
      vy: -Math.random()*2 - 0.5,
      life: 20 + Math.random()*10,
      max:  30,
      col:  cols[Math.floor(Math.random()*cols.length)],
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.08;
    p.life--;
    ctx.globalAlpha = p.life / p.max;
    px(Math.floor(p.x), Math.floor(p.y), p.col);
    ctx.globalAlpha = 1;
  }
}

// ─── MOOD ICON (top-left) ─────────────────────────────────────────────────────
function drawMoodIcon() {
  if (!state.hatched) return;
  if (state.sick) {
    // Skull
    r(1,1,5,5,C.darkest);
    px(2,2,C.bg); px(4,2,C.bg);
    r(2,4,2,1,C.bg); px(4,4,C.bg);
  } else if (state.happiness >= 7) {
    // Heart
    for (const [dx,dy] of [[1,2],[2,1],[3,2],[4,1],[5,2],[1,3],[2,3],[3,3],[4,3],[5,3],[2,4],[3,4],[4,4],[3,5]]) {
      px(dx,dy,C.darkest);
    }
  } else if (state.happiness < 4) {
    // Warning !
    r(3,1,2,3,C.darkest);
    r(3,5,2,2,C.darkest);
  }
}

// ─── CURRENT MOOD ─────────────────────────────────────────────────────────────
function getMood() {
  if (!state.alive)    return 'sad';
  if (state.sleeping)  return 'sleeping';
  if (state.sick)      return 'sick';
  if (state.happiness < 3 || state.hunger >= 8) return 'sad';
  if (state.happiness >= 7 && state.hunger <= 4) return 'happy';
  return 'neutral';
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, 320, 180);
  drawBg();

  if (!state.hatched) {
    drawEgg(35, 33);
    animFrame++;
    return;
  }

  // Poop
  if (state.poop) drawPoop(60, 27);

  // Character wander
  wanderT += 0.008;
  const cx = Math.floor(28 + Math.sin(wanderT) * 8);
  const cy = 22;

  // Action visuals
  if (curAction === 'food') {
    const fx = cx + 14 - Math.min(actTimer * 0.5, 8);
    drawFood(Math.floor(fx), cy - 4);
  }
  if (curAction === 'play') {
    const bx = cx + 16;
    const by = cy - 4 - Math.abs(Math.floor(Math.sin(actTimer * 0.25) * 6));
    drawBall(bx, by);
  }

  drawHelego(cx, cy,
    curAction === 'food'  ? 'eating'  :
    curAction === 'play'  ? 'playing' :
    getMood()
  );

  drawMoodIcon();
  updateParticles();

  if (curAction && --actTimer <= 0) curAction = null;
  animFrame++;
}

// ─── UI UPDATES ───────────────────────────────────────────────────────────────
function renderUI() {
  function fillBlocks(id, val, invert) {
    const el = document.getElementById(id);
    el.innerHTML = '';
    const v = Math.round(val);
    for (let i = 0; i < 10; i++) {
      const d = document.createElement('div');
      // invert: filled = bad (hunger), normal: filled = good (happiness/energy)
      const filled = invert ? (i < (10 - v)) : (i < v);
      const low    = invert ? (10 - v) >= 8 : v <= 2;
      if (filled) d.className = low ? 'stat-block warn' : 'stat-block full';
      else        d.className = 'stat-block';
      el.appendChild(d);
    }
  }
  fillBlocks('hungerBlocks',  state.hunger,    true);   // inverted: full = hungry
  fillBlocks('happyBlocks',   state.happiness, false);
  fillBlocks('energyBlocks',  state.energy,    false);

  document.getElementById('ageDisplay').textContent =
    `${state.age} měs.  ✦  SKÓRE: ${state.score}`;

  const needsAttention = state.hunger >= 7 || state.happiness < 4 || state.poop || state.sick;
  document.getElementById('notif').style.display = (needsAttention && state.hatched && state.alive) ? 'block' : 'none';

  // Toggle play/clean button
  const playIcon  = document.getElementById('btnPlayIcon');
  const playLabel = document.getElementById('btnPlayLabel');
  if (state.poop) {
    playIcon.textContent  = '🧹';
    playLabel.textContent = 'ÚKLID';
  } else {
    playIcon.textContent  = '🎮';
    playLabel.textContent = 'HRA';
  }
}

// ─── MESSAGES ─────────────────────────────────────────────────────────────────
function showMsg(txt, duration = 2200) {
  const el = document.getElementById('msgOverlay');
  el.textContent = txt;
  el.style.display = 'block';
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => { el.style.display = 'none'; }, duration);
}

// ─── GAME OVER / OVERLAY ──────────────────────────────────────────────────────
function showOverlay(txt) {
  document.getElementById('overlayText').textContent = txt;
  document.getElementById('gameOverlay').classList.add('active');
}

function hideOverlay() {
  document.getElementById('gameOverlay').classList.remove('active');
}

function gameOver() {
  state.alive = false;
  saveState();
  speak('Sbohem...', 0.7, 0.8);
  showOverlay(`HELEGOČI\nODEŠLA...\n\nVĚK: ${state.age} měs.\nSKÓRE: ${state.score}`);
}

function newGame() {
  const prevColor = state.eggColor || 0;
  state = defaultState();
  state.eggColor = prevColor; // keep chosen color across new games
  particles = [];
  curAction = null;
  actTimer  = 0;
  wanderT   = 0;
  saveState();
  hideOverlay();
  initEggPicker();
  renderUI();
  showMsg('Nové vajíčko! 🥚');
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function doAction(type) {
  const btnId = { food:'btnFood', play:'btnPlay', sleep:'btnSleep', heal:'btnHeal' }[type];
  const btn   = document.getElementById(btnId);
  btn.classList.add('pressed');
  setTimeout(() => btn.classList.remove('pressed'), 150);

  if (!state.alive) { return; }
  if (!state.hatched) { showMsg('Vajíčko se ještě líhne... 🥚'); return; }
  if (!checkCooldown(type)) return; // silently ignore burst clicks

  if (type === 'food') {
    if (state.sleeping)     { speak('Spí. Nechej ji!'); showMsg('Spí... 💤 nechej ji!'); return; }
    if (state.hunger <= 0.5){ speak('Nejsem hladná!'); showMsg('Nejsem hladná! 😤'); return; }
    state.hunger = Math.max(0, state.hunger - 3);
    state.score += 5;
    curAction = 'food';
    actTimer  = 22;
    const eatPhrases = [
      ['Mňam!', 1.2, 1.6],
      ['Jé, to je dobré!', 1.1, 1.5],
      ['Ještě!' , 1.3, 1.7],
      ['Hmm, výborné!', 1.0, 1.4],
      ['Díky za jídlo!', 1.1, 1.5],
      ['Jsem plná... skoro.', 0.95, 1.3],
    ];
    const ep = eatPhrases[Math.floor(Math.random() * eatPhrases.length)];
    speak(ep[0], ep[1], ep[2]);
    showMsg('🍙 Mňam!');
    // Poop chance
    if (!state.poop && Math.random() < 0.35) {
      setTimeout(() => {
        state.poop = true;
        renderUI();
        saveState();
        speak('Potřebuji záchod!', 1.0, 1.4);
        showMsg('Potřebuje úklid! 💩');
      }, 6000 + Math.random()*4000);
    }
  }

  if (type === 'play') {
    if (state.sleeping)    { speak('Spím! Neruš mě!'); showMsg('Spí! Neruš ji! 😴'); return; }
    if (state.energy < 2)  { speak('Jsem unavená.'); showMsg('Příliš unavená! 😫'); return; }
    state.happiness = Math.min(10, state.happiness + 3);
    state.energy    = Math.max(0,  state.energy - 2);
    state.hunger    = Math.max(0,  state.hunger  - 1);
    state.score    += 10;
    curAction = 'play';
    actTimer  = 28;
    if (state.poop) {
      state.poop = false;
      speak('Děkuju za úklid!', 1.1, 1.4);
      showMsg('Uklizeno! ✨');
    } else {
      const playPhrases = [
        ['Hurá! Hrajeme si!', 1.2, 1.5],
        ['Jéé, to je zábava!', 1.15, 1.5],
        ['Ještě jednou!', 1.3, 1.6],
        ['Tohle miluju!', 1.1, 1.45],
        ['Více! Více!', 1.25, 1.55],
      ];
      const pp = playPhrases[Math.floor(Math.random() * playPhrases.length)];
      speak(pp[0], pp[1], pp[2]);
      showMsg('+ŠTĚSTÍ!  Hurá! 🎮');
    }
    spawnParticles(30, 28, 'play');
  }

  if (type === 'sleep') {
    if (state.sleeping) {
      state.sleeping = false;
      speak('Dobré ráno!', 1.0, 1.3);
      showMsg('Dobré ráno! ☀️');
    } else {
      state.sleeping = true;
      speak('Dobrou noc.', 0.8, 1.0);
      showMsg('Dobrou noc! 🌙');
    }
  }

  if (type === 'heal') {
    if (!state.sick) { speak('Jsem zdravá!'); showMsg('Jsem zdravá! 💪'); return; }
    state.sick   = false;
    state.health = 10;
    state.score += 20;
    speak('Díky! Už mi je lépe!', 1.1, 1.4);
    showMsg('+ZDRAVÍ!  Uzdravena! 💊');
    spawnParticles(33, 28, 'heal');
  }

  saveState();
  renderUI();
}

// ─── GAME TICK (every 1 real second) ─────────────────────────────────────────
let gameTickInterval = setInterval(() => {
  if (!state.alive || !state.hatched) return;

  state.gameTime = (state.gameTime || 0) + 1;

  if (state.sleeping) {
    state.energy  = Math.min(10, state.energy  + 0.4);
    state.hunger  = Math.min(10, state.hunger  + 0.05); // slowly gets hungrier even sleeping
  } else {
    state.hunger    = Math.min(10, state.hunger    + 0.12); // gets hungrier over time
    state.happiness = Math.max(0,  state.happiness - 0.07);
    state.energy    = Math.max(0,  state.energy    - 0.06);
  }

  // Age: 1 month per 60 seconds of gametime
  if (state.gameTime % 60 === 0) {
    state.age++;
    state.score += state.age * 2;
    if (state.age % 12 === 0) {
      const years = state.age / 12;
      speak(`Hurá! Mám narozeniny! ${years} ${years === 1 ? 'rok' : years < 5 ? 'roky' : 'let'}!`, 1.1, 1.5);
      showMsg(`🎂 NAROZENINY!  ${years} ${years === 1 ? 'rok' : years < 5 ? 'roky' : 'let'}!`, 3500);
      spawnParticles(35, 30, 'happy');
      spawnParticles(50, 25, 'happy');
      spawnParticles(20, 28, 'happy');
    } else {
      // silent month tick, no message
    }
  }

  // Sickness: hunger < 3 for a while OR happiness very low for a while
  // Use a neglect counter so it's predictable, not random surprise
  if (!state.sick) {
    if (state.hunger >= 8)        state.neglectTicks = (state.neglectTicks || 0) + 1;
    else if (state.happiness < 3) state.neglectTicks = (state.neglectTicks || 0) + 1;
    else state.neglectTicks = Math.max(0, (state.neglectTicks || 0) - 1);

    if (state.neglectTicks >= 20) { // ~20 seconds of neglect → sick
      state.sick = true;
      state.neglectTicks = 0;
      speak('Au au! Jsem nemocná! Dej mi lék!', 0.9, 1.2);
      showMsg('😷 Helegoči je nemocná!  Dej lék! 💊', 3500);
    }
  }

  // Health drain
  if (state.sick)            state.health = Math.max(0, state.health - 0.15);
  if (state.hunger >= 10)    state.health = Math.max(0, state.health - 0.25);

  // Death check
  if (state.health <= 0 || (state.hunger >= 10 && Math.random() < 0.02)) {
    gameOver();
    return;
  }

  // Auto-poop timer
  if (state.poop) {
    state.poopAge = (state.poopAge || 0) + 1;
    if (state.poopAge > 120) { // 2 min uncleaned → sad
      state.happiness = Math.max(0, state.happiness - 0.3);
    }
  } else {
    state.poopAge = 0;
  }

  saveState();
  renderUI();
}, 1000);

// ─── EGG HATCH TIMER ─────────────────────────────────────────────────────────
function tickEgg() {
  if (state.hatched) return;
  state.eggTimer -= 0.5;
  if (state.eggTimer <= 0) {
    state.hatched = true;
    speak('Helegoči se vylíhla!');
    spawnParticles(38, 28, 'happy');
    spawnParticles(42, 28, 'happy');
    spawnParticles(30, 30, 'happy');
    saveState();
    renderUI();
  } else {
    setTimeout(tickEgg, 500);
  }
}
if (!state.hatched) setTimeout(tickEgg, 500);

// ─── RENDER LOOP ─────────────────────────────────────────────────────────────
function loop() {
  render();
  requestAnimationFrame(loop);
}
loop();

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === '1') doAction('food');
  if (e.key === '2') doAction('play');
  if (e.key === '3') doAction('sleep');
  if (e.key === '4') doAction('heal');
  if (e.key === 'n' || e.key === 'N') newGame();
});

// ─── EGG COLOR PICKER INIT ───────────────────────────────────────────────────
function initEggPicker() {
  const picker = document.getElementById('eggPicker');
  // Remove old swatches if any (for newGame calls)
  picker.querySelectorAll('.egg-swatch').forEach(s => s.remove());

  EGG_COLORS.forEach((col, i) => {
    const sw = document.createElement('div');
    sw.className = 'egg-swatch' + (i === (state.eggColor || 0) ? ' active' : '');
    sw.style.background = col.body;
    sw.style.borderColor = col.outline;
    sw.title = col.name;
    sw.addEventListener('click', () => {
      state.eggColor = i;
      saveState();
      picker.querySelectorAll('.egg-swatch').forEach((s, j) => {
        s.classList.toggle('active', j === i);
      });
    });
    picker.appendChild(sw);
  });
}
initEggPicker();

// ─── SHOW OFFLINE MESSAGE ─────────────────────────────────────────────────────
if (offlineMessage) {
  const notice = document.getElementById('offlineNotice');
  notice.textContent = offlineMessage;
  notice.classList.add('show');
  setTimeout(() => notice.classList.remove('show'), 5000);
}

// ─── HANDLE DEAD STATE ON LOAD ───────────────────────────────────────────────
if (!state.alive) {
  setTimeout(() =>
    showOverlay(`HELEGOČI\nODEŠLA...\n\nVĚK: ${state.age} měs.\nSKÓRE: ${state.score}`)
  , 500);
}

// ─── INITIAL UI ───────────────────────────────────────────────────────────────
renderUI();
if (!hadSave) { speak('Vajíčko se třepe...', 0.8, 1.0); showMsg('Vajíčko se třepe... 🥚'); }
else if (state.hatched && state.alive) { speak('Ahoj! Jsem ráda, že jsi zpět!', 1.0, 1.3); showMsg('Vítej zpět! 👋'); }
</script>
</body>
</html>
